{% extends "main/base.html" %}

{% block title %}
Пароль змінено
{% endblock %}

{% block content %}

<section class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7 col-sm-10">

            <div class="card border-0 shadow rounded-4">

                <div class="card-body text-center p-5">

                    <div class="mb-4">
                        <div class="bg-success rounded-circle d-inline-flex justify-content-center align-items-center"
                             style="width:90px;height:90px;">
                            <i class="bi bi-check-lg text-white fs-1"></i>
                        </div>
                    </div>

                    <h2 class="fw-bold mb-3">
                        Пароль успішно змінено
                    </h2>

                    <p class="text-muted mb-4">
                        Ваш пароль було успішно оновлено.
                        Тепер ви можете продовжити користуватися своїм акаунтом.
                    </p>

                    <a href="{% url 'users:profile' %}"
                       class="btn btn-dark px-5 rounded-pill">
                        <i class="bi bi-person"></i>
                        До профілю
                    </a>

                </div>

            </div>

        </div>
    </div>

</section>

{% endblock %}
