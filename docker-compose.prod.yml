version: '1.1'
services:
  web:
    build: 
      context: Dockerfile.prod
    container_name: Dockefile.prod
    restart: always
    command: >
      sh -c "
          gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threds 2 --timeout 120 --access-logfile --errors-logfile
      "
    env_file:
      - .env.prod
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: services_healthy
  db:
    image: postgres:16
    container_name: db_postgres_prod
    restart: always
    ports:
      - "5433:5432"
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin_prod", "-d", "mydb_prod"]
      interval: 30s
      timeout: 30s
      retries: 5
  nginx:
    image: nginx
    container_name: Nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/deafault.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web